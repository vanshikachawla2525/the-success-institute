<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="YP7CgMMjX29vRxy0LrU_4KheL3v0OodXqYyxF1jqd_Y" />
    <title>Success Institute</title>
    <script>
      (function() {
        var originalFetch = window.fetch;
        if (originalFetch) {
          var currentFetch = originalFetch;
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() { return currentFetch; },
              set: function(val) { currentFetch = val; },
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            console.warn("Unable to patch window.fetch directly:", e);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
